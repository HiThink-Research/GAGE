<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Retro Stream</title>
  <style>
    :root {
      color-scheme: dark;
    }
    * {
      box-sizing: border-box;
    }
    html, body {
      margin: 0;
      height: 100%;
      background: #0a0a0d;
      color: #e6e6ea;
      font-family: "IBM Plex Mono", "Courier New", monospace;
    }
    body {
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 8px;
      padding: 12px;
    }
    #hud {
      display: flex;
      flex-direction: column;
      gap: 4px;
      font-size: 12px;
      letter-spacing: 0.02em;
    }
    #status {
      font-weight: 600;
    }
    #canvas {
      width: 100%;
      height: 100%;
      background: #111;
      border-radius: 10px;
      outline: 1px solid #2a2a36;
      image-rendering: pixelated;
    }
  </style>
</head>
<body>
  <div id="hud">
    <div id="status">Connecting...</div>
    <div id="hint">Controls: WASD (or arrows) move, J=A (jump), K=B (run), L=Select, Enter=Start.</div>
  </div>
  <canvas id="canvas"></canvas>
  <script src="/client.js"></script>
</body>
</html>
