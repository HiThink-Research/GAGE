[pytest]
pythonpath = src
testpaths = tests
python_files = test_*.py
norecursedirs = __pycache__ .pytest_cache .gage_cache runs tests/_support tests/data
addopts = --import-mode=importlib
markers =
    fast: Unit tests, no I/O (default)
    io: Tests involving disk I/O
    gpu: Tests requiring GPU resources
    network: Tests requiring network access
    live: Live external service tests requiring credentials
    external_harness: External harness integration and live tests
    performance: Baseline performance tests excluded from default collection
    compat: Compatibility tests
