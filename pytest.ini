[pytest]
pythonpath = src
testpaths = tests
python_files = test_*.py
norecursedirs = __pycache__ .pytest_cache .gage_cache runs tests/_support
addopts = --import-mode=importlib
markers =
    fast: Unit tests, no I/O (default)
    io: Tests involving disk I/O
    gpu: Tests requiring GPU resources
    network: Tests requiring network access
    compat: Compatibility tests
