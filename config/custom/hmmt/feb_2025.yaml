api_version: ai/v1alpha1
kind: PipelineConfig
metadata:
  name: vllm_async
  description: vllm_backend。

custom:
  steps:
    - step: inference
    - step: auto_eval

datasets:
  - dataset_id: eval_ds
    hub: huggingface
    hub_params:
      hub_id: MathArena/hmmt_feb_2025
      split: train
    loader: hf_hub
    params:
      preprocess: hmmt_feb_2025_preprocessor
backends:
  - backend_id: vllm_backend
    type: vllm
    config:
      model_path: /mnt/model/qwen2_5_05B
      tokenizer_path: /mnt/model/qwen2_5_05B
      force_tokenize_prompt: true
      tokenizer_trust_remote_code: true      
      tensor_parallel_size: 1
      max_tokens: 1280
      sampling_params:
        temperature: 0.0
        top_p: 0.8
      max_batch_size: 16
      max_model_len: 4096
      gpu_memory_utilization: 0.9
      async_max_concurrency: 32
  - backend_id: litellm_backend
    type: litellm
    config:
      api_base: https://api.openai.com/v1
      model: gpt-4.1
      provider: openai
      generation_parameters:
        max_new_tokens: 512
        temperature: 0.0
      streaming: false
      max_retries: 6

role_adapters:
  - adapter_id: vllm_qwen
    role_type: dut_model
    backend_id: vllm_backend
    #backend_id: litellm_backend    
    capabilities:
      - chat_completion

metrics:
  - metric_id: hmmt_accuracy
    implementation: hmmt_accuracy

tasks:
  - task_id: task_eval
    dataset_id: eval_ds
    max_samples: 30
    reporting:
      sinks:
        - type: console
        - type: file
          params:
            output_path: ${GAGE_EVAL_SAVE_DIR:-./runs}/eval_vllm_events.jsonl