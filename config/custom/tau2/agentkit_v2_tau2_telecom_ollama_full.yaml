api_version: gage/v1alpha1
kind: PipelineConfig

metadata:
  name: agentkit_v2_tau2_telecom_ollama_full
  description: >
    Executable AgentKit v2 wrapper for Tau2 telecom where both the DUT agent
    and Tau2 user simulator target a local Ollama OpenAI-compatible endpoint.

prompts:
  - prompt_id: dut/tau2@ollama
    renderer: jinja_chat
    template: |
      <instructions>
      {{ sample.metadata.tau2.agent_instruction }}
      </instructions>
      <policy>
      {{ sample.metadata.tau2.policy }}
      </policy>
    params:
      role: system
      include_existing: true

datasets:
  - dataset_id: tau2_telecom_base
    loader: tau2_tasks
    params:
      source: huggingface
      hub_id: HuggingFaceH4/tau2-bench-data
      domain: telecom
      task_split: base
      num_trials: ${TAU2_NUM_TRIALS:-1}
      seed: ${TAU2_SEED:-300}
      data_dir: ${TAU2_DATA_DIR:-./local-datasets/tau2}
      preprocess: tau2_preprocessor

backends:
  - backend_id: tau2_ollama_http
    type: openai_http
    config:
      base_url: ${OLLAMA_BASE_URL:-http://127.0.0.1:11434/v1}
      model: ${OLLAMA_MODEL:-qwen3-vl:2b-instruct}
      api_key: ${OLLAMA_API_KEY:-dummy}
      require_api_key: false
      max_retries: 6
      generation_parameters:
        temperature: ${TAU2_AGENT_TEMPERATURE:-0.0}
        max_new_tokens: ${TAU2_AGENT_MAX_TOKENS:-4096}

agents:
  - agent_id: tau2_agent
    scheduler:
      type: framework_loop
      backend_id: tau2_ollama_http
      config:
        max_turns: ${TAU2_MAX_TURNS:-200}
        force_tool_choice: ${TAU2_FORCE_TOOL_CHOICE:-never}
        tool_dialect: ${TAU2_AGENT_TOOL_FORMAT:-auto}
        tool_call_retry_budget: ${TAU2_TOOL_CALL_RETRY_BUDGET:-3}
        plain_text_response_tool: respond
        plain_text_response_formats:
          - qwen
          - qwen3
          - qwen3.5
          - qwen3.6
          - gemma
          - gemma4
          - gemma-4
          - gemma_4
          - functiongemma
    config:
      prompt_id: dut/tau2@ollama
    tooling:
      skill_ids: []
      mcp_servers: []

benchmarks:
  - benchmark_id: tau2_telecom
    kit_id: tau2
    config:
      domain: telecom
      data_dir: ${TAU2_DATA_DIR:-./local-datasets/tau2}
      max_steps: ${TAU2_MAX_STEPS:-200}
      max_errors: ${TAU2_MAX_ERRORS:-10}
      respond_tool_name: respond
      user_simulator:
        type: litellm
        model: ${TAU2_USER_MODEL:-ollama_chat/qwen3-vl:2b-instruct}
        model_args:
          api_base: ${OLLAMA_BASE_URL:-http://127.0.0.1:11434/v1}
          api_key: ${OLLAMA_API_KEY:-dummy}
          temperature: ${TAU2_USER_TEMPERATURE:-0.0}

environments:
  - env_id: tau2_local_process
    provider: local_process
    profile_id: tau2-local-process
    lifecycle: per_sample
    profile:
      asset_dir: src/gage_eval/agent_eval_kits/tau2/environment/local_process
    startup_env:
      TAU2_DATA_DIR: ${TAU2_DATA_DIR:-./local-datasets/tau2}

dut_agents:
  - dut_id: tau2_dut
    agent_id: tau2_agent
    env_id: tau2_local_process
    benchmark_id: tau2_telecom
    trial_policy:
      trials: ${TAU2_TRIAL_REPEATS:-1}

metrics:
  - metric_id: tau2_reward
    implementation: tau2_reward
  - metric_id: tau2_pass
    implementation: tau2_pass
  - metric_id: tau2_pass_hat_k
    implementation: tau2_pass_hat_k
    aggregation: tau2_pass_hat
  - metric_id: tau2_agent_cost
    implementation: tau2_agent_cost
  - metric_id: tau2_user_cost
    implementation: tau2_user_cost

summary_generators:
  - tau2_summary

tasks:
  - task_id: tau2_telecom_ollama_full
    dataset_id: tau2_telecom_base
    steps:
      - step: inference
        adapter_id: tau2_dut
      - step: auto_eval
    concurrency: 1
    reporting:
      sinks:
        - type: console
        - type: file
          params:
            output_path: ${GAGE_EVAL_SAVE_DIR:-./runs}/tau2_telecom_ollama_full_summary.json
