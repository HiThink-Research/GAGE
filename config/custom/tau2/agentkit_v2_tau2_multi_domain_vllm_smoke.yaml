api_version: gage/v1alpha1
kind: PipelineConfig

metadata:
  name: agentkit_v2_tau2_multi_domain_vllm_smoke
  description: >
    Executable AgentKit v2 wrapper for a multi-domain Tau2 smoke run
    (airline, retail, telecom). The DUT agent uses local in-process vLLM.

# User-simulator vLLM server notes:
#   vllm serve Qwen/Qwen2.5-72B-Instruct \
#     --enable-auto-tool-choice --tool-call-parser hermes
prompts:
  - prompt_id: dut/tau2@vllm
    renderer: jinja_chat
    template: |
      <instructions>
      {{ sample.metadata.tau2.agent_instruction }}
      </instructions>
      <policy>
      {{ sample.metadata.tau2.policy }}
      </policy>
    params:
      role: system
      include_existing: true

datasets:
  - dataset_id: tau2_airline_base
    loader: tau2_tasks
    params:
      source: huggingface
      hub_id: HuggingFaceH4/tau2-bench-data
      domain: airline
      task_split: base
      num_trials: ${TAU2_NUM_TRIALS:-1}
      seed: ${TAU2_SEED:-300}
      data_dir: ${TAU2_DATA_DIR:-./local-datasets/tau2}
      preprocess: tau2_preprocessor

  - dataset_id: tau2_retail_base
    loader: tau2_tasks
    params:
      source: huggingface
      hub_id: HuggingFaceH4/tau2-bench-data
      domain: retail
      task_split: base
      num_trials: ${TAU2_NUM_TRIALS:-1}
      seed: ${TAU2_SEED:-300}
      data_dir: ${TAU2_DATA_DIR:-./local-datasets/tau2}
      preprocess: tau2_preprocessor

  - dataset_id: tau2_telecom_base
    loader: tau2_tasks
    params:
      source: huggingface
      hub_id: HuggingFaceH4/tau2-bench-data
      domain: telecom
      task_split: base
      num_trials: ${TAU2_NUM_TRIALS:-1}
      seed: ${TAU2_SEED:-300}
      data_dir: ${TAU2_DATA_DIR:-./local-datasets/tau2}
      preprocess: tau2_preprocessor

backends:
  - backend_id: tau2_vllm
    type: vllm
    config:
      model_path: ${VLLM_MODEL_PATH:-Qwen/Qwen2.5-7B-Instruct}
      trust_remote_code: true
      tokenizer_trust_remote_code: true
      force_tokenize_prompt: true
      tensor_parallel_size: ${VLLM_TENSOR_PARALLEL_SIZE:-1}
      pipeline_parallel_size: ${VLLM_PIPELINE_PARALLEL_SIZE:-1}
      max_model_len: ${VLLM_MAX_MODEL_LEN:-8192}
      max_tokens: ${TAU2_AGENT_MAX_TOKENS:-2048}
      request_timeout: ${VLLM_REQUEST_TIMEOUT:-300}
      sampling_params:
        temperature: ${TAU2_AGENT_TEMPERATURE:-0.0}

agents:
  - agent_id: tau2_agent
    scheduler:
      type: framework_loop
      backend_id: tau2_vllm
      config:
        max_turns: ${TAU2_MAX_TURNS:-200}
        force_tool_choice: ${TAU2_FORCE_TOOL_CHOICE:-never}
        tool_dialect: ${TAU2_AGENT_TOOL_FORMAT:-auto}
        tool_call_retry_budget: ${TAU2_TOOL_CALL_RETRY_BUDGET:-3}
        plain_text_response_tool: respond
        plain_text_response_formats:
          - qwen
          - qwen3
          - qwen3.5
          - qwen3.6
          - gemma
          - gemma4
          - gemma-4
          - gemma_4
          - functiongemma
    config:
      prompt_id: dut/tau2@vllm
    tooling:
      skill_ids: []
      mcp_servers: []

benchmarks:
  - benchmark_id: tau2_benchmark
    kit_id: tau2
    config:
      data_dir: ${TAU2_DATA_DIR:-./local-datasets/tau2}
      max_steps: ${TAU2_MAX_STEPS:-200}
      max_errors: ${TAU2_MAX_ERRORS:-10}
      respond_tool_name: respond
      user_simulator:
        type: openai_http
        model: ${TAU2_USER_MODEL:-Qwen/Qwen2.5-72B-Instruct}
        base_url: ${TAU2_USER_BASE_URL:-http://127.0.0.1:8000/v1}
        api_key: ${TAU2_USER_API_KEY:-dummy}
        model_args:
          temperature: ${TAU2_USER_TEMPERATURE:-0.0}

environments:
  - env_id: tau2_local_process
    provider: local_process
    profile_id: tau2-local-process
    lifecycle: per_sample
    profile:
      asset_dir: src/gage_eval/agent_eval_kits/tau2/environment/local_process
    startup_env:
      TAU2_DATA_DIR: ${TAU2_DATA_DIR:-./local-datasets/tau2}

dut_agents:
  - dut_id: tau2_dut
    agent_id: tau2_agent
    env_id: tau2_local_process
    benchmark_id: tau2_benchmark
    trial_policy:
      trials: ${TAU2_TRIAL_REPEATS:-1}

metrics:
  - metric_id: tau2_reward
    implementation: tau2_reward
  - metric_id: tau2_pass
    implementation: tau2_pass
  - metric_id: tau2_pass_hat_k
    implementation: tau2_pass_hat_k
    aggregation: tau2_pass_hat
  - metric_id: tau2_agent_cost
    implementation: tau2_agent_cost
  - metric_id: tau2_user_cost
    implementation: tau2_user_cost

summary_generators:
  - tau2_summary

tasks:
  - task_id: tau2_airline_vllm_smoke
    dataset_id: tau2_airline_base
    max_samples: ${TAU2_DOMAIN_SMOKE_MAX_SAMPLES:-10}
    steps:
      - step: inference
        adapter_id: tau2_dut
      - step: auto_eval
    concurrency: 1

  - task_id: tau2_retail_vllm_smoke
    dataset_id: tau2_retail_base
    max_samples: ${TAU2_DOMAIN_SMOKE_MAX_SAMPLES:-10}
    steps:
      - step: inference
        adapter_id: tau2_dut
      - step: auto_eval
    concurrency: 1

  - task_id: tau2_telecom_vllm_smoke
    dataset_id: tau2_telecom_base
    max_samples: ${TAU2_DOMAIN_SMOKE_MAX_SAMPLES:-10}
    steps:
      - step: inference
        adapter_id: tau2_dut
      - step: auto_eval
    concurrency: 1
