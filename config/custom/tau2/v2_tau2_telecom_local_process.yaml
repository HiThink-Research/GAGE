kind: AgentEvalConfig
metadata:
  name: tau2-telecom-v2-local-process
  description: AgentKit v2 Tau2 telecom local-process smoke config.
backends:
  - backend_id: tau2_litellm
    type: litellm
    config:
      model: ${TAU2_AGENT_MODEL:-openai/qwen/qwen3.5-9b}
      api_base: ${LMSTUDIO_BASE_URL:-http://127.0.0.1:1234/v1}
      api_key: ${LMSTUDIO_API_KEY:-dummy}
      streaming: false
      timeout: 180
      max_retries: 2
      drop_params: true
agents:
  - agent_id: tau2_agent
    scheduler:
      type: framework_loop
      backend_id: tau2_litellm
      config:
        max_turns: ${TAU2_MAX_TURNS:-200}
    config: {}
benchmarks:
  - benchmark_id: tau2_telecom
    kit_id: tau2
    config:
      domain: telecom
      user_simulator:
        type: litellm
        model: ${TAU2_USER_MODEL:-openai/qwen/qwen3.5-9b}
        api_base: ${LMSTUDIO_BASE_URL:-http://127.0.0.1:1234/v1}
        api_key: ${LMSTUDIO_API_KEY:-dummy}
        drop_params: true
        model_args:
          temperature: ${TAU2_USER_TEMPERATURE:-0.0}
environments:
  - env_id: tau2_local_process
    provider: local_process
    profile_id: tau2-local-process
    profile:
      asset_dir: src/gage_eval/agent_eval_kits/tau2/environment/local_process
    provider_config:
      data_dir: ${TAU2_DATA_DIR:-./local-datasets/tau2}
      max_steps: ${TAU2_MAX_STEPS:-200}
      max_errors: ${TAU2_MAX_ERRORS:-10}
      respond_tool_name: respond
      user_model: ${TAU2_USER_MODEL:-openai/qwen/qwen3.5-9b}
      user_model_args:
        api_base: ${LMSTUDIO_BASE_URL:-http://127.0.0.1:1234/v1}
        api_key: ${LMSTUDIO_API_KEY:-dummy}
        drop_params: true
        temperature: ${TAU2_USER_TEMPERATURE:-0.0}
    startup_env:
      TAU2_DATA_DIR: ${TAU2_DATA_DIR:-./local-datasets/tau2}
dut_agents:
  - dut_id: tau2_dut
    agent_id: tau2_agent
    env_id: tau2_local_process
    benchmark_id: tau2_telecom
    trial_policy:
      trials: ${TAU2_NUM_TRIALS:-1}
