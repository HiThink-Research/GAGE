api_version: gage/v1alpha1
kind: PipelineConfig

metadata:
  name: gomoku_llm_headless_openai_gamekit
  description: >
    GameArena Gomoku manual smoke config that binds one LLM player through
    the headless GameKit PlayerDriver runtime and keeps the opponent deterministic.

datasets:
  - dataset_id: gomoku_gamekit_fixture_only
    loader: jsonl
    params:
      path: tests/data/Test_Gomoku.jsonl
      streaming: false

backends:
  - backend_id: openai_litellm_backend
    type: litellm
    config:
      provider: openai
      api_base: ${OPENAI_API_BASE:-https://api.openai.com/v1}
      api_key: ${OPENAI_API_KEY:?set OPENAI_API_KEY}
      model: ${GAGE_GAME_ARENA_LLM_MODEL:-gpt-5.4}
      streaming: false
      timeout: 30
      max_retries: 3
      generation_parameters:
        max_new_tokens: 64
        temperature: 0.0
        top_p: 1.0

custom:
  steps:
    - step: arena
      adapter_id: gomoku_llm_headless_gamekit_arena

role_adapters:
  - adapter_id: gomoku_llm_headless_gamekit_arena
    role_type: arena
    params:
      game_kit: gomoku
      env: gomoku_standard
      runtime_overrides:
        board_size: 3
        win_len: 3
      players:
        - seat: black
          player_id: Black
          player_kind: llm
          backend_id: openai_litellm_backend
        - seat: white
          player_id: White
          player_kind: dummy
          actions: ["B1", "B2"]
