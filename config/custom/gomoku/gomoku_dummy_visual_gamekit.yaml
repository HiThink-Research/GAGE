api_version: gage/v1alpha1
kind: PipelineConfig

metadata:
  name: gomoku_dummy_visual_gamekit
  description: >
    GameArena Gomoku manual smoke config that keeps both seats deterministic
    while exercising the arena_visual runtime and browser host.

datasets:
  - dataset_id: gomoku_gamekit_fixture_only
    loader: jsonl
    params:
      path: tests/data/Test_Gomoku.jsonl
      streaming: false

custom:
  steps:
    - step: arena
      adapter_id: gomoku_dummy_visual_gamekit_arena

role_adapters:
  - adapter_id: gomoku_dummy_visual_gamekit_arena
    role_type: arena
    params:
      game_kit: gomoku
      env: gomoku_standard
      runtime_overrides:
        board_size: 3
        win_len: 3
        coord_scheme: A1
        obs_image: true
      visualizer:
        enabled: true
        title: GAGE Gomoku Board
        launch_browser: true
        mode: arena_visual
        port: 5801
        linger_after_finish_s: 15.0
      players:
        - seat: black
          player_id: Black
          player_kind: dummy
          actions: ["A1", "A2", "A3"]
        - seat: white
          player_id: White
          player_kind: dummy
          actions: ["B1", "B2"]
