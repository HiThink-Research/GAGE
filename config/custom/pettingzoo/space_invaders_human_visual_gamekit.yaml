api_version: gage/v1alpha1
kind: PipelineConfig

metadata:
  name: space_invaders_human_visual_gamekit
  description: >
    GameArena Space Invaders human-vs-dummy manual smoke config for the arena_visual
    web app. The human player occupies pilot_0 and submits actions through the live
    session action queue while pilot_1 remains deterministic for repeatable browser checks.

datasets:
  - dataset_id: space_invaders_gamekit_fixture_only
    loader: jsonl
    params:
      path: tests/data/pettingzoo_atari_demo.jsonl
      streaming: false

custom:
  steps:
    - step: arena
      adapter_id: space_invaders_human_visual_gamekit_arena

role_adapters:
  - adapter_id: space_invaders_human_visual_gamekit_arena
    role_type: arena
    params:
      game_kit: pettingzoo
      env: space_invaders
      runtime_overrides:
        backend_mode: real
        include_raw_obs: true
        use_action_meanings: true
      human_input:
        enabled: true
        host: 127.0.0.1
        port: 0
      visualizer:
        enabled: true
        title: GAGE Space Invaders Arena Visual
        launch_browser: true
        mode: arena_visual
        port: 5807
        live_scene_scheme: http_pull
        linger_after_finish_s: 15.0
      players:
        - seat: pilot_0
          player_id: pilot_0
          player_kind: human
        - seat: pilot_1
          player_id: pilot_1
          player_kind: dummy
          actions: ["LEFT", "NOOP"]
