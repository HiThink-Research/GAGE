api_version: gage/v1alpha1
kind: PipelineConfig

metadata:
  name: pettingzoo_space_invaders_dummy_ws_rgb_demo
  description: PettingZoo Atari space_invaders demo with ws_rgb display registration.

custom:
  steps:
    - step: arena
      adapter_id: pettingzoo_space_invaders_arena
    - step: auto_eval

datasets:
  - dataset_id: pettingzoo_space_invaders_dummy
    loader: jsonl
    params:
      path: tests/data/pettingzoo_atari_demo.jsonl
      streaming: false

backends:
  - backend_id: pz_dummy_player_0
    type: dummy
    config:
      responses: ["0", "1", "2", "3", "4", "5"]
      random: true
      seed: 1234
  - backend_id: pz_dummy_player_1
    type: dummy
    config:
      responses: ["0", "1", "2", "3", "4", "5"]
      random: true
      seed: 5678

role_adapters:
  - adapter_id: pz_dummy_player_0
    role_type: dut_model
    backend_id: pz_dummy_player_0
    capabilities: [chat_completion]
  - adapter_id: pz_dummy_player_1
    role_type: dut_model
    backend_id: pz_dummy_player_1
    capabilities: [chat_completion]

  - adapter_id: pettingzoo_space_invaders_arena
    role_type: arena
    params:
      human_input:
        ws_host: ${WS_RGB_HOST:-127.0.0.1}
        ws_port: ${WS_RGB_PORT:-5800}
        ws_allow_origin: "*"
      environment:
        impl: pettingzoo_aec_v1
        env_id: pettingzoo.atari.space_invaders_v2
        display_mode: websocket
        env_kwargs:
          render_mode: rgb_array
          max_cycles: 3000
        seed: 1234
        include_raw_obs: false
        use_action_meanings: false
        replay:
          enabled: true
          primary_mode: true
          frame_capture:
            enabled: true
            frame_stride: 2
            max_frames: 1200
            format: jpeg
            quality: 75
      rules:
        illegal_policy:
          retry: 1
          on_fail: loss
      scheduler:
        type: turn
        max_turns: 3000
      parser:
        impl: discrete_action_parser_v1
      players:
        - name: player_0
          player_id: player_0
          type: backend
          ref: pz_dummy_player_0
          max_retries: 1
          fallback_policy: random
        - name: player_1
          player_id: player_1
          type: backend
          ref: pz_dummy_player_1
          max_retries: 1
          fallback_policy: random

tasks:
  - task_id: pettingzoo_space_invaders_dummy_ws_rgb
    dataset_id: pettingzoo_space_invaders_dummy
    max_samples: 1
    concurrency: 1
    reporting:
      sinks:
        - type: console
