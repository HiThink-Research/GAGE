api_version: gage/v1alpha1
kind: PipelineConfig

metadata:
  name: space_invaders_double_llm_visual_low_latency_channel_openai_gamekit
  description: >
    GameArena Space Invaders visual smoke config that binds both pilot seats
    to the OpenAI LiteLLM backend while exercising the arena_visual web app
    over the low_latency_channel live scene path.

datasets:
  - dataset_id: space_invaders_gamekit_fixture_only
    loader: jsonl
    params:
      path: tests/data/pettingzoo_atari_demo.jsonl
      streaming: false

backends:
  - backend_id: openai_litellm_backend
    type: litellm
    config:
      provider: openai
      api_base: ${OPENAI_API_BASE:-https://api.openai.com/v1}
      api_key: ${OPENAI_API_KEY:?set OPENAI_API_KEY}
      model: ${GAGE_GAME_ARENA_LLM_MODEL:-gpt-5.4}
      streaming: false
      timeout: 30
      max_retries: 3
      generation_parameters:
        max_new_tokens: 64
        temperature: 0.0
        top_p: 1.0

custom:
  steps:
    - step: arena
      adapter_id: space_invaders_double_llm_visual_low_latency_channel_gamekit_arena

role_adapters:
  - adapter_id: space_invaders_double_llm_visual_low_latency_channel_gamekit_arena
    role_type: arena
    params:
      game_kit: pettingzoo
      env: space_invaders
      runtime_overrides:
        backend_mode: real
        max_cycles: 32
        include_raw_obs: true
        use_action_meanings: true
      visualizer:
        enabled: true
        title: GAGE Space Invaders Arena Visual
        launch_browser: true
        mode: arena_visual
        port: 5807
        live_scene_scheme: low_latency_channel
        linger_after_finish_s: 15.0
      players:
        - seat: pilot_0
          player_id: pilot_0
          player_kind: llm
          backend_id: openai_litellm_backend
        - seat: pilot_1
          player_id: pilot_1
          player_kind: llm
          backend_id: openai_litellm_backend
