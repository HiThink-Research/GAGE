api_version: gage/v1alpha1
kind: PipelineConfig

metadata:
  name: pettingzoo_pong_dummy_ws_rgb_demo
  description: PettingZoo Atari pong demo with ws_rgb display registration.

custom:
  steps:
    - step: arena
      adapter_id: pettingzoo_pong_arena
    - step: auto_eval

datasets:
  - dataset_id: pettingzoo_pong_dummy
    loader: jsonl
    params:
      path: tests/data/pettingzoo_atari_demo.jsonl
      streaming: false

backends:
  - backend_id: pz_dummy_player_0
    type: dummy
    config:
      responses: ["0", "1", "2", "3", "4", "5"]
      cycle: true
  - backend_id: pz_dummy_player_1
    type: dummy
    config:
      responses: ["0", "1", "2", "3", "4", "5"]
      cycle: true

prompts:
  - prompt_id: pettingzoo_turn_prompt_v1
    renderer: jinja_chat
    params:
      role: system
      include_existing: false
    template: |
      You are a precise PettingZoo action planner for {{ payload.env_id or payload.game_type }}.
      Scheduler mode: {{ payload.mode }}.
      Output policy:
      - Return exactly one legal action from the legal moves list.
      - Legal moves: {{ payload.legal_moves | join(", ") }}.
      - Output ONLY the action label or action id.
      - Do not output extra text.
      {% if payload.retry_reason %}
      Retry reason from previous output: {{ payload.retry_reason }}.
      {% endif %}
      {% if payload.last_model_output %}
      Previous model output: {{ payload.last_model_output }}.
      {% endif %}

role_adapters:
  - adapter_id: pz_dummy_player_0
    role_type: dut_model
    backend_id: pz_dummy_player_0
    capabilities: [chat_completion]
  - adapter_id: pz_dummy_player_1
    role_type: dut_model
    backend_id: pz_dummy_player_1
    capabilities: [chat_completion]

  - adapter_id: pettingzoo_pong_arena
    role_type: arena
    prompt_id: pettingzoo_turn_prompt_v1
    params:
      human_input:
        ws_host: ${WS_RGB_HOST:-127.0.0.1}
        ws_port: ${WS_RGB_PORT:-5800}
        ws_allow_origin: "*"
      environment:
        impl: pettingzoo_aec_v1
        env_id: pettingzoo.atari.pong_v3
        display_mode: websocket
        env_kwargs:
          render_mode: human
          max_cycles: 300
        seed: 1234
        include_raw_obs: false
        use_action_meanings: false
        replay:
          enabled: true
          primary_mode: true
          frame_capture:
            enabled: true
            frame_stride: 2
            max_frames: 600
            format: jpeg
            quality: 75
      rules:
        illegal_policy:
          retry: 1
          on_fail: loss
      scheduler:
        type: turn
        max_turns: 300
      parser:
        impl: discrete_action_parser_v1
      players:
        - name: player_0
          player_id: player_0
          type: backend
          ref: pz_dummy_player_0
          max_retries: 1
          fallback_policy: first_legal
        - name: player_1
          player_id: player_1
          type: backend
          ref: pz_dummy_player_1
          max_retries: 1
          fallback_policy: first_legal

tasks:
  - task_id: pettingzoo_pong_dummy_ws_rgb
    dataset_id: pettingzoo_pong_dummy
    max_samples: 1
    concurrency: 1
    reporting:
      sinks:
        - type: console
