api_version: gage/v1alpha1
kind: PipelineConfig

metadata:
  name: vizdoom_llm_visual_gamekit
  description: >
    GameArena ViZDoom manual smoke config that binds one LLM player through
    the visualization-ready GameKit PlayerDriver runtime and keeps the opponent deterministic.

datasets:
  - dataset_id: vizdoom_gamekit_fixture_only
    loader: jsonl
    params:
      path: tests/data/Test_ViZDoom_Demo.jsonl
      streaming: false

backends:
  - backend_id: local_qwen35_litellm_backend
    type: litellm
    config:
      provider: openai
      api_base: http://127.0.0.1:1234/v1
      api_key: lmstudio
      model: qwen/qwen3.5-9b
      streaming: false
      timeout: 30
      max_retries: 3
      generation_parameters:
        max_new_tokens: 64
        temperature: 0.0
        top_p: 1.0

custom:
  steps:
    - step: arena
      adapter_id: vizdoom_llm_visual_gamekit_arena

role_adapters:
  - adapter_id: vizdoom_llm_visual_gamekit_arena
    role_type: arena
    params:
      game_kit: vizdoom
      env: duel_map01
      runtime_overrides:
        stub_max_rounds: 3
        show_pov: false
        capture_pov: true
        obs_image: true
        frame_stride: 1
      visualizer:
        enabled: true
        title: GAGE ViZDoom Live
        launch_browser: true
        mode: arena_visual
        live_scene_scheme: http_pull
        linger_after_finish_s: 3.0
      players:
        - seat: p0
          player_id: doom_alpha
          player_kind: llm
          backend_id: local_qwen35_litellm_backend
        - seat: p1
          player_id: doom_beta
          player_kind: dummy
          actions: ["3", "2", "3"]
