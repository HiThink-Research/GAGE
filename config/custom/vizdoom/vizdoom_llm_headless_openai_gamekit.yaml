api_version: gage/v1alpha1
kind: PipelineConfig

metadata:
  name: vizdoom_llm_headless_openai_gamekit
  description: >
    GameArena ViZDoom manual smoke config that binds one LLM player through
    the headless GameKit PlayerDriver runtime and keeps the opponent deterministic.

datasets:
  - dataset_id: vizdoom_gamekit_fixture_only
    loader: jsonl
    params:
      path: tests/data/Test_ViZDoom_Demo.jsonl
      streaming: false

backends:
  - backend_id: openai_litellm_backend
    type: litellm
    config:
      provider: openai
      api_base: ${OPENAI_API_BASE:-https://api.openai.com/v1}
      api_key: ${OPENAI_API_KEY:?set OPENAI_API_KEY}
      model: ${GAGE_GAME_ARENA_LLM_MODEL:-gpt-5.4}
      streaming: false
      timeout: 30
      max_retries: 3
      generation_parameters:
        max_new_tokens: 64
        temperature: 0.0
        top_p: 1.0

custom:
  steps:
    - step: arena
      adapter_id: vizdoom_llm_headless_gamekit_arena

role_adapters:
  - adapter_id: vizdoom_llm_headless_gamekit_arena
    role_type: arena
    params:
      game_kit: vizdoom
      env: duel_map01
      runtime_overrides:
        backend_mode: dummy
        stub_max_rounds: 3
      players:
        - seat: p0
          player_id: doom_alpha
          player_kind: llm
          backend_id: openai_litellm_backend
        - seat: p1
          player_id: doom_beta
          player_kind: dummy
          actions: ["3", "2", "3"]
