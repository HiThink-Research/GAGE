api_version: gage/v1alpha1
kind: PipelineConfig

metadata:
  name: vizdoom_human_vs_llm_record_ws_rgb
  description: ViZDoom arena demo (Human vs LLM, record scheduler, ws_rgb viewer).

custom:
  steps:
    - step: arena
      adapter_id: vizdoom_human_arena
    - step: auto_eval

datasets:
  - dataset_id: vizdoom_demo_dataset
    loader: jsonl
    params:
      path: tests/data/Test_ViZDoom_Demo.jsonl
      preprocess: grid_game_preprocessor
      streaming: false

backends:
  - backend_id: vizdoom_litellm
    type: litellm
    config:
      provider: ${VIZDOOM_LITELLM_PROVIDER:-openai}
      api_base: ${VIZDOOM_LITELLM_API_BASE:-http://10.217.219.2:2722/v1}
      api_key: ${VIZDOOM_LITELLM_API_KEY:-empty}
      model: ${VIZDOOM_LITELLM_MODEL:-/mnt/model/qwen3_omni_30b/}
      generation_parameters:
        max_new_tokens: 256
        temperature: 0.2
      streaming: false
      max_retries: 6

role_adapters:
  - adapter_id: vizdoom_llm_adapter
    role_type: dut_model
    backend_id: vizdoom_litellm
    capabilities:
      - chat_completion

  - adapter_id: vizdoom_websocket_human
    role_type: human
    params:
      source: queue

  - adapter_id: vizdoom_human_arena
    role_type: arena
    params:
      human_input:
        enabled: true
        host: ${VIZDOOM_INPUT_HOST:-127.0.0.1}
        port: ${VIZDOOM_INPUT_PORT:-8001}
        allow_origin: "*"
        ws_host: ${WS_RGB_HOST:-127.0.0.1}
        ws_port: ${WS_RGB_PORT:-5800}
        ws_allow_origin: "*"
      environment:
        impl: vizdoom_env_v1
        display_mode: websocket
#        config_path: src/gage_eval/role/arena/games/vizdoom/_vizdoom.ini
        replay_output_dir: runs/vizdoom_replays
        show_pov: false
        capture_pov: true
        pov_stride: 1
        show_automap: false
        use_single_process: false
        max_steps: 20000
        action_repeat: 2
        sleep_s: 0.02
        obs_image: true
        no_attack_seconds: 0
        allow_partial_actions: true
        replay_in_env: false
        reset_retry_count: 3
        death_check_warmup_steps: 8
        legal_moves:
          - "1"
          - "2"
          - "3"
        action_schema:
          key_map:
            left: "2"
            a: "2"
            arrowleft: "2"
            right: "3"
            d: "3"
            arrowright: "3"
            space: "1"
            j: "1"
      scheduler:
        type: record
        tick_ms: 20
        action_timeout_ms: 30000
        timeout_fallback_move: "0"
      parser:
        impl: vizdoom_parser_v1
      players:
        - name: p0
          type: human
          ref: vizdoom_websocket_human
          timeout_ms: 100
          timeout_fallback_move: "0"
        - name: p1
          type: backend
          ref: vizdoom_llm_adapter
          max_retries: 1
          fallback_policy: first_legal
          timeout_ms: 100
          timeout_fallback_move: "0"

metrics: []

tasks:
  - task_id: vizdoom_human_vs_llm_record_ws_rgb_task
    dataset_id: vizdoom_demo_dataset
    max_samples: 1
    concurrency: 1
    reporting:
      sinks:
        - type: console
        - type: file
          params:
            output_path: ${GAGE_EVAL_SAVE_DIR:-./runs}/vizdoom_human_vs_llm_record_ws_rgb_events.jsonl
