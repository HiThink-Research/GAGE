api_version: gage/v1alpha1
kind: PipelineConfig

metadata:
  name: agentkit_v2_tau2_local_lmstudio
  description: Manual AgentKit v2 E2E for Tau2 telecom on local_process with LMStudio.

prompts:
  - prompt_id: dut/tau2@manual-lmstudio
    renderer: jinja_chat
    template: |
      <instructions>
      {{ sample.metadata.tau2.agent_instruction }}
      {{ sample.metadata.tau2.gage_instruction }}
      </instructions>
      <policy>
      {{ sample.metadata.tau2.policy }}
      </policy>
    params:
      role: system
      include_existing: true

datasets:
  - dataset_id: tau2_telecom_base
    loader: tau2_tasks
    params:
      source: huggingface
      hub_id: HuggingFaceH4/tau2-bench-data
      domain: telecom
      task_split: base
      num_trials: 1
      seed: ${TAU2_SEED:-300}
      data_dir: ${TAU2_DATA_DIR:-./local-datasets/tau2}
      preprocess: tau2_preprocessor

backends:
  - backend_id: lmstudio_litellm
    type: litellm
    config:
      api_base: ${LMSTUDIO_BASE_URL:-http://127.0.0.1:1234/v1}
      model: ${LMSTUDIO_LITELLM_MODEL:-openai/qwen/qwen3.5-9b}
      api_key: ${LMSTUDIO_API_KEY:-dummy}
      streaming: false
      timeout: 180
      max_retries: 2
      drop_params: true
      generation_parameters:
        temperature: 0.0

agents:
  - agent_id: tau2_agent
    scheduler:
      type: framework_loop
      backend_id: lmstudio_litellm
      config:
        max_turns: ${TAU2_MAX_TURNS:-200}
    config:
      prompt_id: dut/tau2@manual-lmstudio
    tooling:
      skill_ids: []
      mcp_servers: []

benchmarks:
  - benchmark_id: tau2_telecom
    kit_id: tau2
    config:
      domain: telecom
      user_simulator:
        type: litellm
        model: ${TAU2_USER_MODEL:-openai/qwen/qwen3.5-9b}
        api_base: ${LMSTUDIO_BASE_URL:-http://127.0.0.1:1234/v1}
        api_key: ${LMSTUDIO_API_KEY:-dummy}
        drop_params: true
        temperature: 0.0

environments:
  - env_id: tau2_local_process
    provider: local_process
    profile_id: tau2-local-process
    lifecycle: per_sample
    profile:
      asset_dir: src/gage_eval/agent_eval_kits/tau2/environment/local_process
    provider_config:
      data_dir: ${TAU2_DATA_DIR:-./local-datasets/tau2}
      max_steps: ${TAU2_MAX_STEPS:-200}
      max_errors: ${TAU2_MAX_ERRORS:-10}
      respond_tool_name: respond
    startup_env:
      TAU2_DATA_DIR: ${TAU2_DATA_DIR:-./local-datasets/tau2}

dut_agents:
  - dut_id: tau2_dut
    agent_id: tau2_agent
    env_id: tau2_local_process
    benchmark_id: tau2_telecom
    trial_policy:
      trials: 1

metrics:
  - metric_id: tau2_reward
    implementation: tau2_reward
  - metric_id: tau2_pass
    implementation: tau2_pass
  - metric_id: tau2_pass_hat_k
    implementation: tau2_pass_hat_k
    aggregation: tau2_pass_hat
  - metric_id: tau2_agent_cost
    implementation: tau2_agent_cost
  - metric_id: tau2_user_cost
    implementation: tau2_user_cost

summary_generators:
  - tau2_summary

tasks:
  - task_id: manual_tau2_local_lmstudio
    dataset_id: tau2_telecom_base
    steps:
      - step: inference
        adapter_id: tau2_dut
      - step: auto_eval
    max_samples: ${TAU2_MAX_SAMPLES:-1}
    concurrency: 1
