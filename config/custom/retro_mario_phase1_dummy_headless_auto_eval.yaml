api_version: gage/v1alpha1
kind: PipelineConfig

metadata:
  name: retro_mario_dummy_headless_auto_eval
  description: Stable-retro Mario dummy demo in pure headless mode with auto-eval.

custom:
  steps:
    - step: arena
      adapter_id: retro_mario_arena
    - step: auto_eval

datasets:
  - dataset_id: retro_mario_demo
    loader: jsonl
    params:
      path: config/custom/retro_mario_phase1.jsonl
      streaming: false

backends:
  - backend_id: retro_dummy
    type: dummy
    config:
      cycle: true
      responses:
        - '{"move":"right_run","hold_ticks":6}'
        - '{"move":"right_run_jump","hold_ticks":6}'
        - '{"move":"right","hold_ticks":4}'
        - '{"move":"noop","hold_ticks":3}'

role_adapters:
  - adapter_id: retro_dummy_player
    role_type: dut_model
    backend_id: retro_dummy
    capabilities:
      - chat_completion

  - adapter_id: retro_mario_arena
    role_type: arena
    params:
      environment:
        impl: retro_env_v1
        game: SuperMarioBros3-Nes-v0
        state: Start
        display_mode: headless
        obs_image: false
        record_bk2: false
        legal_moves:
          - noop
          - right
          - right_run
          - right_jump
          - right_run_jump
        action_schema:
          hold_ticks_min: 1
          hold_ticks_max: 12
          hold_ticks_default: 6
        info_feeder:
          impl: info_last_v1
      scheduler:
        type: tick
        tick_ms: 100
        max_ticks: 3600
      parser:
        impl: retro_action_v1
        hold_ticks_min: 1
        hold_ticks_max: 12
        hold_ticks_default: 6
      players:
        - name: player_0
          type: backend
          ref: retro_dummy_player
          max_retries: 0
          fallback_policy: first_legal

metrics:
  - metric_id: retro_episode_length_steps
    implementation: episode_length_steps
  - metric_id: retro_legal_action_rate
    implementation: legal_action_rate
  - metric_id: retro_illegal_action_count
    implementation: illegal_action_count
  - metric_id: retro_on_time_rate
    implementation: on_time_rate
  - metric_id: retro_completion_flag
    implementation: completion_flag
  - metric_id: retro_termination_reason
    implementation: termination_reason
    aggregation: categorical_count

tasks:
  - task_id: retro_mario_dummy_headless_auto_eval
    dataset_id: retro_mario_demo
    max_samples: 1
    concurrency: 1
    reporting:
      sinks:
        - type: console
        - type: file
          params:
            output_path: ${GAGE_EVAL_SAVE_DIR:-./runs}/retro_mario_dummy_headless_auto_eval_events.jsonl
