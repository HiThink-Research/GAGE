api_version: gage/v1alpha1
kind: PipelineConfig
metadata:
  name: gomoku_replay_oneclick_dummy
custom:
  steps:
  - step: arena
    adapter_id: gomoku_arena
datasets:
- dataset_id: gomoku_local
  loader: jsonl
  params:
    path: tests/data/Test_Gomoku_LiteLLM.jsonl
    preprocess: grid_game_preprocessor
    streaming: false
backends:
- backend_id: gomoku_dummy_black
  type: dummy
  config:
    responses:
    - A1
    - B1
    - C1
    - D1
    cycle: true
- backend_id: gomoku_dummy_white
  type: dummy
  config:
    responses:
    - A2
    - B2
    - C2
    - D2
    cycle: true
role_adapters:
- adapter_id: gomoku_dummy_black
  role_type: dut_model
  backend_id: gomoku_dummy_black
  capabilities:
  - chat_completion
- adapter_id: gomoku_dummy_white
  role_type: dut_model
  backend_id: gomoku_dummy_white
  capabilities:
  - chat_completion
- adapter_id: gomoku_arena
  role_type: arena
  params:
    environment:
      impl: gomoku_local_v1
      board_size: 9
      coord_scheme: A1
      replay:
        enabled: true
        primary_mode: true
        frame_capture:
          enabled: true
          frame_stride: 1
          max_frames: 120
    rules:
      win_len: 5
      illegal_policy:
        retry: 0
        on_fail: loss
    scheduler:
      type: turn
      max_turns: 60
    parser:
      impl: grid_parser_v1
      coord_scheme: A1
    players:
    - name: Black
      player_id: Black
      type: backend
      ref: gomoku_dummy_black
      max_retries: 0
      fallback_policy: first_legal
    - name: White
      player_id: White
      type: backend
      ref: gomoku_dummy_white
      max_retries: 0
      fallback_policy: first_legal
tasks:
- task_id: gomoku_replay_oneclick_dummy
  dataset_id: gomoku_local
  max_samples: 1
  concurrency: 1
