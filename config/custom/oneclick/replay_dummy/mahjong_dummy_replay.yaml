api_version: gage/v1alpha1
kind: PipelineConfig
metadata:
  name: mahjong_replay_oneclick_dummy
custom:
  steps:
  - step: arena
    adapter_id: mahjong_arena
datasets:
- dataset_id: mahjong_local
  loader: jsonl
  params:
    path: tests/data/Test_Mahjong_Dummy.jsonl
    preprocess: card_game_preprocessor
    streaming: false
backends:
- backend_id: mj_dummy_0
  type: dummy
  config:
    responses:
    - pass
    - stand
    - chow
    cycle: true
- backend_id: mj_dummy_1
  type: dummy
  config:
    responses:
    - pass
    - stand
    - pong
    cycle: true
- backend_id: mj_dummy_2
  type: dummy
  config:
    responses:
    - pass
    - stand
    - kong
    cycle: true
- backend_id: mj_dummy_3
  type: dummy
  config:
    responses:
    - pass
    - stand
    - hu
    cycle: true
role_adapters:
- adapter_id: mj_dummy_0
  role_type: dut_model
  backend_id: mj_dummy_0
  capabilities:
  - chat_completion
- adapter_id: mj_dummy_1
  role_type: dut_model
  backend_id: mj_dummy_1
  capabilities:
  - chat_completion
- adapter_id: mj_dummy_2
  role_type: dut_model
  backend_id: mj_dummy_2
  capabilities:
  - chat_completion
- adapter_id: mj_dummy_3
  role_type: dut_model
  backend_id: mj_dummy_3
  capabilities:
  - chat_completion
- adapter_id: mahjong_arena
  role_type: arena
  params:
    environment:
      impl: mahjong_rlcard_v1
      game_type: mahjong
      chat_mode: 'off'
      replay_live: false
      replay:
        enabled: true
        primary_mode: true
        frame_capture:
          enabled: true
          frame_stride: 1
          max_frames: 180
    rules:
      illegal_policy:
        retry: 0
        on_fail: random
    scheduler:
      type: turn
      max_turns: 120
    parser:
      impl: mahjong_v1
    players:
    - name: p0
      player_id: player_0
      type: backend
      ref: mj_dummy_0
      max_retries: 0
      fallback_policy: first_legal
    - name: p1
      player_id: player_1
      type: backend
      ref: mj_dummy_1
      max_retries: 0
      fallback_policy: first_legal
    - name: p2
      player_id: player_2
      type: backend
      ref: mj_dummy_2
      max_retries: 0
      fallback_policy: first_legal
    - name: p3
      player_id: player_3
      type: backend
      ref: mj_dummy_3
      max_retries: 0
      fallback_policy: first_legal
tasks:
- task_id: mahjong_replay_oneclick_dummy
  dataset_id: mahjong_local
  max_samples: 1
  concurrency: 1
