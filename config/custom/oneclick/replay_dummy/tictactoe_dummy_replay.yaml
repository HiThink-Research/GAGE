api_version: gage/v1alpha1
kind: PipelineConfig
metadata:
  name: tictactoe_replay_oneclick_dummy
custom:
  steps:
  - step: arena
    adapter_id: tictactoe_arena
datasets:
- dataset_id: tictactoe_local
  loader: jsonl
  params:
    path: tests/data/Test_TicTacToe.jsonl
    preprocess: grid_game_preprocessor
    streaming: false
backends:
- backend_id: ttt_dummy_x
  type: dummy
  config:
    responses:
    - '0'
    - '1'
    - '2'
    cycle: true
- backend_id: ttt_dummy_o
  type: dummy
  config:
    responses:
    - '2'
    - '1'
    - '0'
    cycle: true
role_adapters:
- adapter_id: ttt_dummy_x
  role_type: dut_model
  backend_id: ttt_dummy_x
  capabilities:
  - chat_completion
- adapter_id: ttt_dummy_o
  role_type: dut_model
  backend_id: ttt_dummy_o
  capabilities:
  - chat_completion
- adapter_id: tictactoe_arena
  role_type: arena
  params:
    environment:
      impl: tictactoe_v1
      board_size: 3
      coord_scheme: ROW_COL
      replay:
        enabled: true
        primary_mode: true
        frame_capture:
          enabled: true
          frame_stride: 1
          max_frames: 60
    rules:
      win_len: 3
      illegal_policy:
        retry: 0
        on_fail: loss
    scheduler:
      type: turn
      max_turns: 16
    parser:
      impl: grid_parser_v1
      board_size: 3
      coord_scheme: ROW_COL
    players:
    - name: X
      player_id: X
      type: backend
      ref: ttt_dummy_x
      max_retries: 0
      fallback_policy: first_legal
    - name: O
      player_id: O
      type: backend
      ref: ttt_dummy_o
      max_retries: 0
      fallback_policy: first_legal
tasks:
- task_id: tictactoe_replay_oneclick_dummy
  dataset_id: tictactoe_local
  max_samples: 1
  concurrency: 1
