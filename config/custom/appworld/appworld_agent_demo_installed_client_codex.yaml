api_version: gage/v1alpha1
kind: PipelineConfig

metadata:
  name: appworld_agent_demo_installed_client_codex
  description: AgentKit v2 AppWorld demo using the builtin Codex installed client.

datasets:
  - dataset_id: appworld_demo
    loader: jsonl
    params:
      path: tests/data/samples/appworld_demo.jsonl
      streaming: false

backends: []

agents:
  - agent_id: appworld_agent
    scheduler:
      type: installed_client
      config: {}
    config: {}
    tooling:
      skill_ids: []
      mcp_servers: []

benchmarks:
  - benchmark_id: appworld_demo
    kit_id: appworld
    config: {}

environments:
  - env_id: appworld_local
    provider: docker
    profile_id: appworld_local
    lifecycle: per_sample
    profile:
      asset_dir: src/gage_eval/agent_eval_kits/appworld/environment/docker
      metadata:
        env_endpoint: http://127.0.0.1:8000
        apis_endpoint: http://127.0.0.1:9000
        mcp_endpoint: http://127.0.0.1:5001
    provider_config:
      image: ${APPWORLD_CODEX_IMAGE:-appworld-mcp-codex:latest}
      network_policy: allow
      docker_platform: linux/amd64
      ports:
        - "8000:8000"
        - "9000:9000"
        - "5001:5001"
      wait_for_http_endpoints:
        - http://127.0.0.1:5001/mcp
      startup_timeout_s: 180
      startup_interval_s: 0.5
      entrypoint:
        - /usr/local/bin/appworld
        - serve
      keepalive_command:
        - multiple
        - --environment
        - "--port 8000"
        - --apis
        - "--port 9000"
        - --mcp
        - "http --port 5001 --output-type structured_data_only"
        - --root
        - /run
      workdir: /run
      exec_workdir: /run
      environment:
        VIRTUAL_ENV: ""
        PATH: /usr/local/bin:/usr/local/sbin:/usr/sbin:/usr/bin:/sbin:/bin
    resources:
      cpu: 2
      memory_gb: 4.0
      network_policy: allow

metrics:
  - metric_id: latency
    implementation: latency

dut_agents:
  - dut_id: dut_agent_main
    agent_id: appworld_agent
    env_id: appworld_local
    benchmark_id: appworld_demo
    trial_policy:
      trials: 1

tasks:
  - task_id: appworld_agent_demo_installed_client_codex
    dataset_id: appworld_demo
    steps:
      - step: inference
        adapter_id: dut_agent_main
      - step: auto_eval
    concurrency: 1
    max_samples: 2
