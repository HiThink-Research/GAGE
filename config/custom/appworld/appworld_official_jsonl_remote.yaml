api_version: gage/v1alpha1
kind: PipelineConfig

metadata:
  name: appworld_official_jsonl_remote
  description: AgentKit v2 AppWorld official JSONL evaluation on an E2B-style remote wrapper.

datasets:
  - dataset_id: appworld_dev
    loader: jsonl
    params:
      path: local-datasets/appworld/dev.jsonl
      missing_hint: "Run: gage-eval-main/docker/appworld/export_datasets.sh --image appworld-mcp:latest --output local-datasets/appworld"
      preprocess: appworld_preprocessor
      preprocess_kwargs:
        subset: dev
        ground_truth_mode: full
      streaming: false

backends:
  - backend_id: gpt52_openai_http
    type: openai_http
    config:
      base_url: https://api.openai.com/v1
      model: gpt-5.2
      require_api_key: true
      max_retries: 6

agents:
  - agent_id: appworld_agent
    scheduler:
      type: framework_loop
      backend_id: gpt52_openai_http
      config:
        max_turns: 120
        force_tool_choice: first_turn
        refresh_tool_schemas: true
        mcp_client_id: appworld_env
    config: {}
    tooling:
      skill_ids: []
      mcp_servers: []

benchmarks:
  - benchmark_id: appworld_dev
    kit_id: appworld
    config: {}

environments:
  - env_id: appworld_remote
    provider: e2b
    profile_id: appworld-e2b-wrapper
    lifecycle: per_sample
    profile:
      asset_dir: src/gage_eval/agent_eval_kits/appworld/environment/e2b
      metadata:
        env_endpoint: ${APPWORLD_ENV_ENDPOINT:-http://placeholder}
        apis_endpoint: ${APPWORLD_APIS_ENDPOINT:-http://placeholder}
        mcp_endpoint: ${APPWORLD_MCP_ENDPOINT:-http://placeholder}
    provider_config:
      template_id: ${APPWORLD_E2B_TEMPLATE_ID:-gage-appworld-wrapper}
      sandbox_timeout_s: ${APPWORLD_E2B_SANDBOX_TIMEOUT_S:-900}
      request_timeout_s: ${APPWORLD_E2B_REQUEST_TIMEOUT_S:-120}
      network_policy: allow
    resources:
      cpu: 2
      memory_gb: 4.0
      network_policy: allow

mcp_clients:
  - mcp_client_id: appworld_env
    transport: streamable_http
    endpoint: ${APPWORLD_MCP_ENDPOINT:-http://placeholder}
    timeout_s: 180
    params:
      output_type: structured_data_only
      session_retry_delay_s: 2
      session_retry_timeout_s: 180

metrics:
  - metric_id: appworld_tgc
    implementation: appworld_tgc
  - metric_id: appworld_sgc
    implementation: appworld_sgc
  - metric_id: appworld_pass_count
    implementation: appworld_pass_count
  - metric_id: appworld_fail_count
    implementation: appworld_fail_count
  - metric_id: appworld_difficulty
    implementation: appworld_difficulty
    aggregation: categorical_count
    params:
      category_field: difficulty

dut_agents:
  - dut_id: dut_agent_main
    agent_id: appworld_agent
    env_id: appworld_remote
    benchmark_id: appworld_dev
    trial_policy:
      trials: 1

tasks:
  - task_id: appworld_dev_eval
    dataset_id: appworld_dev
    steps:
      - step: inference
        adapter_id: dut_agent_main
      - step: auto_eval
    concurrency: 4
    max_samples: 20
    reporting:
      sinks:
        - type: console
