api_version: gage/v1alpha1
kind: PipelineConfig

metadata:
  name: appworld_agent_demo
  description: AgentKit v2 AppWorld agent demo with runtime-owned MCP tools.

datasets:
  - dataset_id: appworld_demo
    loader: jsonl
    params:
      path: tests/data/samples/appworld_demo.jsonl
      streaming: false

backends:
  - backend_id: gpt52_openai_http
    type: openai_http
    config:
      base_url: https://api.openai.com/v1
      model: gpt-5-mini
      require_api_key: true
      max_retries: 6

agents:
  - agent_id: appworld_agent
    scheduler:
      type: framework_loop
      backend_id: gpt52_openai_http
      config:
        max_turns: 16
        force_tool_choice: first_turn
        refresh_tool_schemas: true
        mcp_client_id: appworld_env
    config: {}
    tooling:
      skill_ids: []
      mcp_servers: []

benchmarks:
  - benchmark_id: appworld_demo
    kit_id: appworld
    config: {}

environments:
  - env_id: appworld_local
    provider: docker
    profile_id: appworld_local
    lifecycle: per_sample
    profile:
      asset_dir: src/gage_eval/agent_eval_kits/appworld/environment/docker
      metadata:
        env_endpoint: http://127.0.0.1:8000
        apis_endpoint: http://127.0.0.1:9000
        mcp_endpoint: http://127.0.0.1:5001
    provider_config:
      image: appworld-mcp:latest
      network_policy: allow
      docker_platform: linux/amd64
      ports:
        - "8000:8000"
        - "9000:9000"
        - "5001:5001"
      wait_for_http_endpoints:
        - http://127.0.0.1:5001/mcp
      startup_timeout_s: 180
      startup_interval_s: 0.5
      entrypoint:
        - /usr/local/bin/appworld
        - serve
      keepalive_command:
        - multiple
        - --environment
        - "--port 8000"
        - --apis
        - "--port 9000"
        - --mcp
        - "http --port 5001 --output-type structured_data_only"
        - --root
        - /run
      workdir: /run
      exec_workdir: /run
      environment:
        VIRTUAL_ENV: ""
        PATH: /usr/local/bin:/usr/local/sbin:/usr/sbin:/usr/bin:/sbin:/bin
    resources:
      cpu: 2
      memory_gb: 4.0
      network_policy: allow

mcp_clients:
  - mcp_client_id: appworld_env
    transport: streamable_http
    endpoint: http://127.0.0.1:5001
    timeout_s: 180
    params:
      output_type: structured_data_only
      session_retry_delay_s: 2
      session_retry_timeout_s: 180

metrics:
  - metric_id: latency
    implementation: latency

dut_agents:
  - dut_id: dut_agent_main
    agent_id: appworld_agent
    env_id: appworld_local
    benchmark_id: appworld_demo
    trial_policy:
      trials: 1

tasks:
  - task_id: appworld_agent_demo
    dataset_id: appworld_demo
    steps:
      - step: inference
        adapter_id: dut_agent_main
      - step: auto_eval
    concurrency: 1
    max_samples: 2
    reporting:
      sinks:
        - type: console
