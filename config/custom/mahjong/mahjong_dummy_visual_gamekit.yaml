api_version: gage/v1alpha1
kind: PipelineConfig

metadata:
  name: mahjong_dummy_visual_gamekit
  description: >
    GameArena 麻将 manual smoke config that keeps every seat deterministic
    while exercising the arena_visual runtime and browser host.

datasets:
  - dataset_id: mahjong_gamekit_fixture_only
    loader: jsonl
    params:
      path: tests/data/Test_Mahjong_GameKit.jsonl
      streaming: false

custom:
  steps:
    - step: arena
      adapter_id: mahjong_dummy_visual_gamekit_arena

role_adapters:
  - adapter_id: mahjong_dummy_visual_gamekit_arena
    role_type: arena
    params:
      game_kit: mahjong
      env: riichi_4p
      runtime_overrides:
        replay_live: true
      visualizer:
        enabled: true
        title: GAGE Mahjong Table
        launch_browser: true
        mode: arena_visual
        port: 5804
        linger_after_finish_s: 15.0
      players:
        - seat: east
          player_id: east
          player_kind: dummy
          actions: ["B1", "Red"]
        - seat: south
          player_id: south
          player_kind: dummy
          actions: ["C1"]
        - seat: west
          player_id: west
          player_kind: dummy
          actions: ["D1"]
        - seat: north
          player_id: north
          player_kind: dummy
          actions: ["East"]
