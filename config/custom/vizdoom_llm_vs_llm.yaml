api_version: gage/v1alpha1
kind: PipelineConfig

metadata:
  name: vizdoom_llm_vs_llm
  description: ViZDoom arena demo (LLM vs LLM).

custom:
  steps:
    - step: arena
      adapter_id: vizdoom_llm_arena
    - step: auto_eval

datasets:
  - dataset_id: vizdoom_demo_dataset
    loader: jsonl
    params:
      path: tests/data/Test_ViZDoom_Demo.jsonl
      preprocess: grid_game_preprocessor
      streaming: false

backends:
  - backend_id: vizdoom_litellm
    type: litellm
    config:
      provider: openai
      api_base: https://api.openai.com/v1
      model: gpt-5.2
      generation_parameters:
        max_new_tokens: 256
        temperature: 0.2
      streaming: false
      max_retries: 6

role_adapters:
  - adapter_id: vizdoom_llm_p0
    role_type: dut_model
    backend_id: vizdoom_litellm
    capabilities:
      - chat_completion

  - adapter_id: vizdoom_llm_p1
    role_type: dut_model
    backend_id: vizdoom_litellm
    capabilities:
      - chat_completion

  - adapter_id: vizdoom_llm_arena
    role_type: arena
    params:
      environment:
        impl: vizdoom_env_v1
#        config_path: src/gage_eval/role/arena/games/vizdoom/_vizdoom.ini
        replay_output_dir: runs/vizdoom_replays
        replay:
          enabled: true
          primary_mode: true
          mode: both
          frame:
            enabled: true
            stride: 2
            encoding: jpeg
            quality: 80
        render_mode: both
        show_pov: false
        show_automap: false
        use_single_process: false
        max_steps: 20000
        action_repeat: 4
        sleep_s: 0.00
        obs_image: true
        no_attack_seconds: 0
        allow_partial_actions: true
      scheduler:
        type: tick
        tick_ms: 20
      parser:
        impl: vizdoom_parser_v1
      players:
        - name: p0
          type: backend
          ref: vizdoom_llm_p0
          max_retries: 1
          fallback_policy: first_legal
          timeout_ms: 100
          timeout_fallback_move: "0"
        - name: p1
          type: backend
          ref: vizdoom_llm_p1
          max_retries: 1
          fallback_policy: first_legal
          timeout_ms: 100
          timeout_fallback_move: "0"

metrics: []

tasks:
  - task_id: vizdoom_llm_vs_llm_task
    dataset_id: vizdoom_demo_dataset
    max_samples: 1
    concurrency: 1
    reporting:
      sinks:
        - type: console
        - type: file
          params:
            output_path: ${GAGE_EVAL_SAVE_DIR:-./runs}/vizdoom_llm_vs_llm_events.jsonl
