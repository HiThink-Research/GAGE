api_version: gage/v1alpha1
kind: PipelineConfig

metadata:
  name: openra_dummy_gamekit
  description: >
    Minimal GameArena OpenRA template wired through the realtime runtime path.
    The default config keeps the backend deterministic so acceptance coverage
    can run without a native OpenRA bridge.

datasets:
  - dataset_id: openra_gamekit_fixture_only
    loader: jsonl
    params:
      path: tests/data/Test_OpenRA.jsonl
      streaming: false

custom:
  steps:
    - step: arena
      adapter_id: openra_dummy_gamekit_arena

role_adapters:
  - adapter_id: openra_dummy_gamekit_arena
    role_type: arena
    params:
      game_kit: openra
      env: ra_map01
      runtime_overrides:
        backend_mode: dummy
        stub_max_ticks: 6
      players:
        - seat: player_0
          player_id: player_0
          player_kind: dummy
          actions: ["select_units", "queue_production", "issue_command", "camera_pan"]
        - seat: player_1
          player_id: player_1
          player_kind: dummy
          actions: ["camera_pan", "select_units", "issue_command", "queue_production"]
