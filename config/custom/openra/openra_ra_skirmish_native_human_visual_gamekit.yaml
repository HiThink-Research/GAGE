api_version: gage/v1alpha1
kind: PipelineConfig

metadata:
  name: openra_ra_skirmish_native_human_visual_gamekit
  description: >
    Native OpenRA Red Alert skirmish human config for arena_visual. The browser
    drives real engine input while timeout fallback keeps the stream alive.

datasets:
  - dataset_id: openra_gamekit_fixture_only
    loader: jsonl
    params:
      path: tests/data/Test_OpenRA.jsonl
      streaming: false

custom:
  steps:
    - step: arena
      adapter_id: openra_ra_skirmish_native_human_visual_gamekit_arena

role_adapters:
  - adapter_id: openra_ra_skirmish_native_human_visual_gamekit_arena
    role_type: arena
    params:
      game_kit: openra
      env: ra_skirmish_1v1
      runtime_overrides:
        backend_mode: native
        max_decisions: 96
        native_step_interval_s: 0.25
        native_frame_rate_hz: 4.0
        native_startup_orders:
          - option fog False
          - option explored True
      human_input:
        enabled: true
        host: 127.0.0.1
        port: 0
      visualizer:
        enabled: true
        title: GAGE OpenRA Native Human Arena Visual
        launch_browser: true
        mode: arena_visual
        live_scene_scheme: low_latency_channel
        linger_after_finish_s: 30.0
      players:
        - seat: player_0
          player_id: player_0
          player_kind: human
          driver_params:
            timeout_ms: 250
            timeout_fallback_move: noop
        - seat: player_1
          player_id: player_1
          player_kind: dummy
          actions: ["noop"]
