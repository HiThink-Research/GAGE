api_version: gage/v1alpha1
kind: PipelineConfig

metadata:
  name: openra_llm_headless_gamekit
  description: >
    OpenRA manual smoke config that binds one LLM player through the GameKit
    runtime while keeping the backend deterministic and the opponent scripted.

datasets:
  - dataset_id: openra_gamekit_fixture_only
    loader: jsonl
    params:
      path: tests/data/Test_OpenRA.jsonl
      streaming: false

backends:
  - backend_id: local_qwen35_litellm_backend
    type: litellm
    config:
      provider: openai
      api_base: http://127.0.0.1:1234/v1
      api_key: lmstudio
      model: qwen/qwen3.5-9b
      streaming: false
      timeout: 30
      max_retries: 3
      generation_parameters:
        max_new_tokens: 64
        temperature: 0.0
        top_p: 1.0

custom:
  steps:
    - step: arena
      adapter_id: openra_llm_headless_gamekit_arena

role_adapters:
  - adapter_id: openra_llm_headless_gamekit_arena
    role_type: arena
    params:
      game_kit: openra
      env: ra_map01
      runtime_overrides:
        backend_mode: dummy
        stub_max_ticks: 6
      players:
        - seat: player_0
          player_id: player_0
          player_kind: llm
          backend_id: local_qwen35_litellm_backend
        - seat: player_1
          player_id: player_1
          player_kind: dummy
          actions: ["camera_pan", "select_units", "issue_command", "queue_production"]
