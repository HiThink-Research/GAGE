api_version: gage/v1alpha1
kind: PipelineConfig

metadata:
  name: openra_human_visual_gamekit
  description: >
    OpenRA human-vs-dummy config for arena_visual. The current backend remains
    deterministic so the browser flow and human input path can be self-tested
    before the native OpenRA bridge lands.

datasets:
  - dataset_id: openra_gamekit_fixture_only
    loader: jsonl
    params:
      path: tests/data/Test_OpenRA.jsonl
      streaming: false

custom:
  steps:
    - step: arena
      adapter_id: openra_human_visual_gamekit_arena

role_adapters:
  - adapter_id: openra_human_visual_gamekit_arena
    role_type: arena
    params:
      game_kit: openra
      env: ra_map01
      runtime_overrides:
        backend_mode: dummy
        stub_max_ticks: 6
      human_input:
        enabled: true
        host: 127.0.0.1
        port: 0
      visualizer:
        enabled: true
        title: GAGE OpenRA Arena Visual
        launch_browser: true
        mode: arena_visual
        live_scene_scheme: http_pull
        linger_after_finish_s: 15.0
      players:
        - seat: player_0
          player_id: player_0
          player_kind: human
        - seat: player_1
          player_id: player_1
          player_kind: dummy
          actions: ["camera_pan", "select_units", "issue_command", "queue_production"]
