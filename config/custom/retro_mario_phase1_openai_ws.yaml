api_version: gage/v1alpha1
kind: PipelineConfig

metadata:
  name: retro_mario_phase1_openai_ws
  description: Stable-retro Mario demo with OpenAI HTTP backend driving the agent + WebSocket streaming (no human control).

custom:
  steps:
    - step: arena
      adapter_id: retro_mario_arena

datasets:
  - dataset_id: retro_mario_demo
    loader: jsonl
    params:
      path: config/custom/retro_mario_phase1.jsonl
      streaming: false

backends:
  - backend_id: openai_http_player
    type: openai_http
    config:
      base_url: https://api.openai.com/v1
      model: gpt-4o-mini
      require_api_key: true
      default_params:
        temperature: 0.2
        max_tokens: 64

role_adapters:
  - adapter_id: openai_player_0
    role_type: dut_model
    backend_id: openai_http_player
    capabilities:
      - chat_completion

  - adapter_id: retro_mario_arena
    role_type: arena
    params:
      environment:
        impl: retro_env_v1
        game: SuperMarioBros3-Nes-v0
        state: Start
        # Use display_mode=websocket to stream frames from the in-pipeline env.
        display_mode: websocket
        record_bk2: false
        legal_moves:
          - noop
          - right
          - right_run
          - right_jump
          - right_run_jump
        action_schema:
          hold_ticks_min: 1
          hold_ticks_max: 12
          hold_ticks_default: 6
        info_feeder:
          impl: info_last_v1
      scheduler:
        type: tick
        tick_ms: 100
        max_ticks: 3600
      parser:
        impl: retro_action_v1
        hold_ticks_min: 1
        hold_ticks_max: 12
        hold_ticks_default: 6
      # WebSocket server settings (stream-only because no human player is configured).
      human_input:
        enabled: true
        host: 0.0.0.0
        port: 5800
        fps: 30
        hold_ticks_default: 6
      players:
        - name: player_0
          type: backend
          ref: openai_player_0
          max_retries: 1
          fallback_policy: first_legal

tasks:
  - task_id: retro_mario_demo
    dataset_id: retro_mario_demo
    max_samples: 1
    concurrency: 1
    reporting:
      sinks:
        - type: console
        - type: file
          params:
            output_path: ${GAGE_EVAL_SAVE_DIR:-./runs}/retro_mario_openai_ws_events.jsonl

