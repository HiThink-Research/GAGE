api_version: gage/v1alpha1
kind: PipelineConfig

metadata:
  name: retro_mario_llm_visual_gamekit
  description: >
    GameArena retro Mario manual smoke config that binds one LLM player
    through the visualization-ready GameKit PlayerDriver runtime while keeping the realtime backend deterministic.

datasets:
  - dataset_id: retro_mario_gamekit_fixture_only
    loader: jsonl
    params:
      path: tests/data/Test_Retro_Mario.jsonl
      streaming: false

backends:
  - backend_id: local_qwen35_litellm_backend
    type: litellm
    config:
      provider: openai
      api_base: http://127.0.0.1:1234/v1
      api_key: lmstudio
      model: qwen/qwen3.5-9b
      streaming: false
      timeout: 30
      max_retries: 3
      generation_parameters:
        max_new_tokens: 64
        temperature: 0.0
        top_p: 1.0

custom:
  steps:
    - step: arena
      adapter_id: retro_mario_llm_visual_gamekit_arena

role_adapters:
  - adapter_id: retro_mario_llm_visual_gamekit_arena
    role_type: arena
    params:
      game_kit: retro_platformer
      env: retro_mario
      runtime_overrides:
        stub_max_ticks: 4
        max_turns: 12
        display_mode: headless
        obs_image: true
        frame_stride: 1
      visualizer:
        enabled: true
        title: GAGE Retro Mario Live
        launch_browser: true
        mode: arena_visual
        live_scene_scheme: http_pull
        linger_after_finish_s: 15.0
      players:
        - seat: player_0
          player_id: mario
          player_kind: llm
          backend_id: local_qwen35_litellm_backend
