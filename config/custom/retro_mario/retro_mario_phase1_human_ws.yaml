api_version: gage/v1alpha1
kind: PipelineConfig

metadata:
  name: retro_mario_phase1_human_ws
  description: Stable-retro Mario demo with a pure human player controlled via WebSocket (no LLM backend).

custom:
  steps:
    - step: arena
      adapter_id: retro_mario_arena
    - step: auto_eval

datasets:
  - dataset_id: retro_mario_demo
    loader: jsonl
    params:
      path: config/custom/retro_mario/retro_mario_phase1.jsonl
      streaming: false

role_adapters:
  - adapter_id: retro_websocket_human
    role_type: human
    params:
      source: queue

  - adapter_id: retro_mario_arena
    role_type: arena
    params:
      environment:
        impl: retro_env_v1
        game: SuperMarioBros3-Nes-v0
        state: Start
        # display_mode=websocket starts the attached WS server and disables local rendering.
        display_mode: websocket
        record_bk2: false
        legal_moves:
          - noop
          - right
          - right_run
          - right_jump
          - right_run_jump
        action_schema:
          hold_ticks_min: 1
          hold_ticks_max: 12
          hold_ticks_default: 6
        info_feeder:
          impl: info_last_v1
        replay:
          enabled: true
          mode: both
        frame_capture:
          enabled: true
          frame_stride: 3
          max_frames: 900
          format: jpeg
          quality: 75
      scheduler:
        type: record
        tick_ms: 33
        max_ticks: 3600
      parser:
        impl: retro_action_v1
        hold_ticks_min: 1
        hold_ticks_max: 12
        hold_ticks_default: 6
      human_input:
        enabled: true
        host: 0.0.0.0
        port: 8001
        fps: 30
        hold_ticks_default: 6
      players:
        - name: player_0
          type: human
          ref: retro_websocket_human

metrics:
  - metric_id: retro_episode_length_steps
    implementation: episode_length_steps
  - metric_id: retro_legal_action_rate
    implementation: legal_action_rate
  - metric_id: retro_illegal_action_count
    implementation: illegal_action_count
  - metric_id: retro_on_time_rate
    implementation: on_time_rate
  - metric_id: retro_completion_flag
    implementation: completion_flag
  - metric_id: retro_termination_reason
    implementation: termination_reason
    aggregation: categorical_count

tasks:
  - task_id: retro_mario_demo
    dataset_id: retro_mario_demo
    max_samples: 1
    concurrency: 1
    reporting:
      sinks:
        - type: console
        - type: file
          params:
            output_path: ${GAGE_EVAL_SAVE_DIR:-./runs}/retro_mario_human_ws_events.jsonl
