api_version: gage/v1alpha1
kind: PipelineConfig

metadata:
  name: doudizhu_gamekit
  description: >
    Minimal GameArena 斗地主 phase-card template backed by a deterministic
    stub core so acceptance does not depend on rlcard being installed.

datasets:
  - dataset_id: doudizhu_gamekit_fixture_only
    loader: jsonl
    params:
      path: tests/data/Test_Doudizhu_GameKit.jsonl
      streaming: false

custom:
  steps:
    - step: arena
      adapter_id: doudizhu_gamekit_arena

role_adapters:
  - adapter_id: doudizhu_gamekit_arena
    role_type: arena
    params:
      game_kit: doudizhu
      env: classic_3p
      players:
        - seat: landlord
          player_id: landlord
          player_kind: dummy
          actions: ["3", "4"]
        - seat: farmer_left
          player_id: farmer_left
          player_kind: dummy
          actions: ["pass"]
        - seat: farmer_right
          player_id: farmer_right
          player_kind: dummy
          actions: ["pass"]
