api_version: gage/v1alpha1
kind: PipelineConfig

metadata:
  name: skillsbench_smoke_runtime
  description: SkillsBench family parse/config smoke using SWE-bench-compatible runtime contract.

datasets:
  - dataset_id: skillsbench_smoke
    loader: jsonl
    params:
      path: tests/data/samples/skillsbench_demo.jsonl
      streaming: false

backends:
  - backend_id: skillsbench_smoke_dummy
    type: dummy
    config:
      responses:
        - done

agents:
  - agent_id: skillsbench_agent
    scheduler:
      type: framework_loop
      backend_id: skillsbench_smoke_dummy
      config:
        max_turns: 12
    config: {}
    tooling:
      skill_ids: []
      mcp_servers: []

benchmarks:
  - benchmark_id: skillsbench_smoke
    kit_id: skillsbench
    config: {}

environments:
  - env_id: swebench_runtime
    provider: docker
    profile_id: swebench_runtime
    lifecycle: per_sample
    profile:
      asset_dir: src/gage_eval/agent_eval_kits/swebench/environment/docker
    provider_config: {}

dut_agents:
  - dut_id: skillsbench_agent_main
    agent_id: skillsbench_agent
    env_id: swebench_runtime
    benchmark_id: skillsbench_smoke

tasks:
  - task_id: skillsbench_smoke_runtime
    dataset_id: skillsbench_smoke
    steps:
      - step: inference
        adapter_id: skillsbench_agent_main
