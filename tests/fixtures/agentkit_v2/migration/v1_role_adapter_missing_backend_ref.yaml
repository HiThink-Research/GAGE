api_version: gage/v1
kind: PipelineConfig
metadata:
  name: v1_role_adapter_missing_backend_ref
backends:
  - backend_id: model
    type: litellm
    config:
      model: gpt-4.1-mini
agent_backends:
  - agent_backend_id: valid_backend
    type: model_backend
    backend_id: model
role_adapters:
  - adapter_id: valid_agent
    role_type: dut_agent
    agent_backend_id: valid_backend
  - adapter_id: missing_agent
    role_type: dut_agent
    agent_backend_id: missing_backend
