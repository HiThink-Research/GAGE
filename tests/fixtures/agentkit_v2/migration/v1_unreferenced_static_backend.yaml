api_version: gage/v1
kind: PipelineConfig
metadata:
  name: v1_unreferenced_static_backend
backends:
  - backend_id: used_model
    type: litellm
    config:
      model: gpt-4.1-mini
  - backend_id: unused_model
    type: litellm
    config:
      model: gpt-4.1
agent_backends:
  - agent_backend_id: agent_backend
    type: model_backend
    backend_id: used_model
role_adapters:
  - adapter_id: agent
    role_type: dut_agent
    agent_backend_id: agent_backend
